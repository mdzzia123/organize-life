name: organize_life
description: 整理人生 - 多分类生活图片管理 App
publish_to: 'none'
version: 1.5.2+8

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 本地数据库
  objectbox: ^4.0.3
  objectbox_flutter_libs: ^4.0.3
  path_provider: ^2.1.4
  path: ^1.9.0

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 网络 & 云
  dio: ^5.7.0
  uuid: ^4.5.1

  # 图片
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # 工具
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  fluwx: ^4.6.3
  tobias: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  objectbox_generator: ^4.0.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
